<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <title>SkillsBarter — Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle animated background orbs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      width: 320px;
      height: 320px;
      background: #6366f1;
      top: -80px;
      right: -80px;
      animation-delay: 0s;
    }

    body::after {
      width: 260px;
      height: 260px;
      background: #a855f7;
      bottom: -60px;
      left: -60px;
      animation-delay: -4s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
    }

    .container {
      text-align: center;
      padding: 2.5rem;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* Wifi-off icon */
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 2rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
    }

    .icon svg {
      width: 100%;
      height: 100%;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.15s forwards;
    }

    .subtitle {
      font-size: 1.05rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.3s forwards;
    }

    .reconnect-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      opacity: 0;
      animation: fadeInUp 0.6s ease 0.45s forwards;
    }

    .reconnect-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.35);
    }

    .reconnect-btn:active {
      transform: translateY(0);
    }

    .reconnect-btn svg {
      width: 18px;
      height: 18px;
      transition: transform 0.3s ease;
    }

    .reconnect-btn:hover svg {
      transform: rotate(180deg);
    }

    /* Pulse ring around icon */
    .pulse-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100px;
      height: 100px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      position: relative;
      opacity: 0;
      animation: fadeInUp 0.6s ease forwards;
    }

    .pulse-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(99, 102, 241, 0.25);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.25); opacity: 0; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pulse-ring">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:56px;height:56px;opacity:1;animation:none;">
        <!-- Wifi arcs with a slash -->
        <path d="M1 1l22 22" stroke="#a855f7"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="#a855f7" stroke="none"/>
      </svg>
    </div>

    <h1 class="title">You're Offline</h1>
    <p class="subtitle">
      It looks like you've lost your connection.<br/>
      Check your network and try again.
    </p>

    <button class="reconnect-btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Reconnect
    </button>
  </div>
</body>
</html>
